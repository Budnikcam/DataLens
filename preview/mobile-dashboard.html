<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F7F5F0" />
  <title>ЖК «Северный» — мобильный дашборд</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:wght@500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #F7F5F0;
      --card: #FFFFFF;
      --ink: #3A3A3A;
      --muted: #8A8580;
      --line: #E8E0D8;
      --kpi: #2C5F4A;
      --attention: #B8864E;
      --critical: #9E3B33;
      --ok: #6B8F7A;
      --warm: #D4A574;
      --track: #E8E0D8;
      --shadow: 0 4px 16px rgba(58, 58, 58, 0.06);
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-t: env(safe-area-inset-top, 0px);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, sans-serif;
      color: var(--ink);
      background: #EDE9E2;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }
    .stage {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 24px 12px;
    }
    .device {
      width: min(390px, 100%);
      max-height: min(860px, calc(100dvh - 48px));
      background: var(--bg);
      border-radius: 36px;
      box-shadow:
        0 0 0 1px rgba(58,58,58,.06),
        0 0 0 10px #1a1a1a,
        0 28px 56px rgba(58,58,58,.12);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .device::before {
      content: "";
      display: block;
      width: 120px;
      height: 28px;
      margin: 10px auto 0;
      background: #1a1a1a;
      border-radius: 0 0 16px 16px;
      flex-shrink: 0;
    }
    .phone {
      padding: 8px 16px calc(28px + var(--safe-b));
      min-height: 0;
      flex: 1 1 auto;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
    @media (max-width: 440px) {
      body { background: var(--bg); }
      .stage { padding: 0; }
      .device {
        width: 100%;
        height: 100dvh;
        max-height: 100dvh;
        min-height: 100dvh;
        border-radius: 0;
        box-shadow: none;
      }
      .device::before { display: none; }
      .phone {
        padding-top: calc(12px + var(--safe-t));
      }
    }

    .nav {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 24px;
    }
    .nav button {
      min-height: 48px;
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 12px;
      box-shadow: var(--shadow);
      font: 500 14px Inter, sans-serif;
      color: var(--muted);
      cursor: pointer;
      transition: color .2s, border-color .2s, background .2s;
    }
    .nav button.active {
      color: var(--kpi);
      border-color: var(--kpi);
      background: #fff;
    }

    .panel { display: none; }
    .panel.active { display: block; animation: enter .35s ease both; }

    .object {
      font-family: Lora, Georgia, serif;
      font-weight: 600;
      font-size: 16px;
      color: var(--ink);
      margin: 0 0 6px;
      letter-spacing: -0.01em;
    }
    .meta {
      font-size: 11px;
      color: var(--muted);
      margin: 0 0 20px;
    }

    .scores {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 16px 14px;
    }
    .score.wide { grid-column: 1 / -1; }
    .score .lbl {
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 500;
    }
    .score .num {
      font-family: Inter, sans-serif;
      font-size: 32px;
      font-weight: 600;
      line-height: 1;
      color: var(--kpi);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }
    .score .num.sm { font-size: 28px; }
    .score .num.warn { color: var(--attention); }
    .score .delta {
      margin-top: 8px;
      font-size: 11px;
      color: var(--attention);
      font-weight: 500;
    }

    .block { margin-bottom: 20px; }
    .block-title {
      font-family: Lora, Georgia, serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      margin: 0 0 14px;
    }

    .gauge-wrap { display: grid; place-items: center; }
    .gauge { width: 200px; height: 112px; position: relative; }
    .gauge svg { width: 200px; height: 112px; display: block; }
    .gauge .center {
      position: absolute;
      left: 0; right: 0; bottom: 2px;
      text-align: center;
    }
    .gauge .center strong {
      display: block;
      font-size: 28px;
      font-weight: 600;
      color: var(--kpi);
      line-height: 1;
    }
    .gauge .center span {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .legend {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-top: 10px;
      font-size: 11px;
      color: var(--muted);
    }
    .legend i {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 2px;
      margin-right: 6px;
      vertical-align: middle;
    }

    .bars { display: grid; gap: 16px; }
    .bar-row .top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 11px;
      color: var(--muted);
    }
    .bar-row .top strong {
      color: var(--ink);
      font-weight: 600;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }
    .track {
      height: 10px;
      background: var(--track);
      border-radius: 999px;
      overflow: hidden;
    }
    .fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #2C5F4A, #B8864E);
      transform-origin: left center;
      animation: grow .85s ease both;
    }
    .fill.alert {
      background: linear-gradient(90deg, #9E3B33, #D4A574);
    }
    .fill.ok {
      background: linear-gradient(90deg, #2C5F4A, #6B8F7A);
    }

    .dual { display: grid; gap: 16px; }
    .dual-item .name {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .dual-bars { display: grid; gap: 8px; }
    .dual-bars .line {
      display: grid;
      grid-template-columns: 40px 1fr 52px;
      gap: 8px;
      align-items: center;
      font-size: 10px;
      color: var(--muted);
    }
    .dual-bars .line b {
      text-align: right;
      color: var(--ink);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .mini-track {
      height: 7px;
      background: var(--track);
      border-radius: 999px;
      overflow: hidden;
    }
    .mini-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #2C5F4A, #B8864E);
    }
    .mini-fill.plan {
      background: linear-gradient(90deg, #B8864E, #D4A574);
      opacity: 0.85;
    }
    .mini-fill.ok {
      background: linear-gradient(90deg, #2C5F4A, #6B8F7A);
    }

    .compact-list { display: grid; gap: 0; }
    .compact-row {
      display: grid;
      grid-template-columns: 8px 1fr auto;
      gap: 12px;
      align-items: center;
      min-height: 48px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
    }
    .compact-row:last-child { border-bottom: 0; }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--critical);
      flex-shrink: 0;
    }
    .compact-row .t {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 500;
      color: var(--ink);
    }
    .compact-row .m {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .filters {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
    }
    .filters button {
      min-height: 44px;
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 12px;
      box-shadow: var(--shadow);
      font: 500 12px Inter, sans-serif;
      color: var(--muted);
      cursor: pointer;
      transition: color .2s, border-color .2s;
    }
    .filters button.active {
      color: var(--kpi);
      border-color: var(--kpi);
      background: #fff;
    }

    .task-card { padding: 4px 14px 8px; }

    .status-chart {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 20px;
      align-items: center;
      margin-bottom: 4px;
    }
    .ring {
      width: 120px;
      height: 120px;
      position: relative;
      flex-shrink: 0;
    }
    .ring svg {
      display: block;
      width: 120px;
      height: 120px;
      transform: rotate(-90deg);
    }
    .ring .mid {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      text-align: center;
      pointer-events: none;
      z-index: 1;
    }
    .ring .mid strong {
      display: block;
      font-size: 26px;
      font-weight: 600;
      color: var(--kpi);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }
    .ring .mid span {
      display: block;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      line-height: 1.2;
    }
    .stat-legend { display: grid; gap: 12px; }
    .stat-legend div {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
    }
    .stat-legend b { color: var(--ink); font-variant-numeric: tabular-nums; }
    .swatch {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 2px;
      margin-right: 8px;
    }

    @keyframes enter {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: none; }
    }
    @keyframes grow {
      from { transform: scaleX(0.12); }
      to { transform: scaleX(1); }
    }
    @media (prefers-reduced-motion: reduce) {
      .panel.active, .fill { animation: none; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="device">
      <div class="phone">
        <nav class="nav" role="tablist" aria-label="Разделы">
          <button class="active" data-tab="project" type="button" role="tab" aria-selected="true">Проект</button>
          <button data-tab="tasks" type="button" role="tab" aria-selected="false">Задачи</button>
        </nav>

        <section id="project" class="panel active" role="tabpanel">
          <h1 class="object" id="proj-name">—</h1>
          <p class="meta" id="proj-meta">—</p>
          <div class="scores" id="scores"></div>
          <div class="card block" id="gauge-block"></div>
          <div class="card block" id="supply-block"></div>
          <div class="card block" id="finance-block"></div>
          <div class="card block" id="labor-block"></div>
          <div class="card block" id="risks-block" style="margin-bottom:0"></div>
        </section>

        <section id="tasks" class="panel" hidden role="tabpanel">
          <div class="card block" id="status-block"></div>
          <div class="filters" id="filters" role="group" aria-label="Фильтр задач">
            <button class="active" data-filter="open" type="button">В работе</button>
            <button data-filter="fail" type="button">Крит.</button>
            <button data-filter="all" type="button">Все</button>
          </div>
          <div class="card task-card">
            <div class="compact-list" id="task-list"></div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script>
    /* Fallback if fetch('data.json') fails (file:// or offline). Update via data.json + push. */
    const FALLBACK = {
      project: {
        name: "ЖК «Северный»",
        meta: "Генподряд · ООО «Успех» · до 30.06.2027",
        readiness_fact: 54.71,
        readiness_plan: 55,
        delta_pp: -0.29,
        contract_mln: 3544,
        paid_mln: 4368,
        workers_fact: 300,
        workers_plan: 500,
        supply_total_pct: 33
      },
      supply: [
        { name: "Инж. оборуд.", pct: 50, tone: "ok" },
        { name: "Тех. оборуд.", pct: 25, tone: "alert" },
        { name: "Материалы", pct: 30.33, tone: "default" },
        { name: "Итого", pct: 33, tone: "default" }
      ],
      finance: [
        { name: "Договор · млн", plan: 3544, fact: 921 },
        { name: "Лимиты · млн", plan: 4230, fact: 1184 },
        { name: "Оплачено · млн", plan: 5600, fact: 4368 }
      ],
      labor: [
        { name: "Рабочие · чел.", plan: 1123, fact: 863 },
        { name: "ИТР · чел.", plan: 93, fact: 93 }
      ],
      risks: [
        { t: "Финансирование 489 / 1082", m: "24.01" },
        { t: "Неучтенный объём · ПСД", m: "15.01" }
      ],
      tasks: [
        { t: "Рентабельность АО «Успех»", m: "22.07", status: "В работе" },
        { t: "Стратегия ЖК «Северный»", m: "10.07", status: "В работе" },
        { t: "НДС +2% · разногласия", m: "26.07", status: "В работе" },
        { t: "Доп. соглашения (НДС)", m: "24.07", status: "В работе" },
        { t: "Сокращение расходов", m: "еженед.", status: "В работе" },
        { t: "ЖК «Солнце» · благоустр.", m: "28.07", status: "В работе" },
        { t: "Контракты 1С", m: "пт", status: "В работе" },
        { t: "Материалы на балансе", m: "еженед.", status: "В работе" },
        { t: "Договоры с субподрядчиками", m: "03.07", status: "В работе" },
        { t: "Папки с ответами · ВПР", m: "пост.", status: "В работе" },
        { t: "Претензионная работа", m: "пн", status: "В работе" },
        { t: "Приказ · ответственность", m: "03.07", status: "В работе" },
        { t: "АО «Прут» · письмо", m: "20.03", status: "Не исполнено" },
        { t: "ЖК «Берег» · справка", m: "03.07", status: "В работе" }
      ]
    };

    let DATA = FALLBACK;
    let filter = "open";

    const fmtPct = (n, digits = 2) =>
      Number(n).toLocaleString("ru-RU", { minimumFractionDigits: digits, maximumFractionDigits: digits }) + "%";
    const fmtPctShort = (n) =>
      Number(n).toLocaleString("ru-RU", { minimumFractionDigits: 0, maximumFractionDigits: 1 }) + "%";
    const fmtNum = (n) => Math.round(Number(n)).toLocaleString("ru-RU");
    const pctBar = (fact, plan) => Math.min(100, Math.max(0, plan ? (fact / plan) * 100 : 0));
    const esc = (s) => String(s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");

    function gaugePoint(p) {
      const r = 76, cx = 100, cy = 100;
      const a = Math.PI * (1 - Math.min(1, Math.max(0, p)));
      return { x: cx + r * Math.cos(a), y: cy - r * Math.sin(a) };
    }

    function renderProject() {
      const p = DATA.project;
      document.getElementById("proj-name").textContent = p.name;
      document.getElementById("proj-meta").textContent = p.meta;

      const deltaSign = p.delta_pp > 0 ? "+" : "";
      document.getElementById("scores").innerHTML = `
        <div class="card score wide">
          <div class="lbl">Готовность факт</div>
          <div class="num">${fmtPct(p.readiness_fact)}</div>
          <div class="delta">план ${fmtPctShort(p.readiness_plan)} · ${deltaSign}${String(p.delta_pp).replace(".", ",")} п.п.</div>
        </div>
        <div class="card score">
          <div class="lbl">Договор · млн</div>
          <div class="num sm">${fmtNum(p.contract_mln)}</div>
        </div>
        <div class="card score">
          <div class="lbl">Оплачено · млн</div>
          <div class="num sm">${fmtNum(p.paid_mln)}</div>
        </div>
        <div class="card score">
          <div class="lbl">Рабочие факт</div>
          <div class="num sm warn">${fmtNum(p.workers_fact)}</div>
          <div class="delta">план ${fmtNum(p.workers_plan)}</div>
        </div>
        <div class="card score">
          <div class="lbl">Комплектация</div>
          <div class="num sm">${fmtPctShort(p.supply_total_pct)}</div>
        </div>`;

      const factP = p.readiness_fact / 100;
      const planP = p.readiness_plan / 100;
      const end = gaugePoint(factP);
      const planRot = (planP - 0.5) * 180;
      document.getElementById("gauge-block").innerHTML = `
        <h2 class="block-title">Готовность</h2>
        <div class="gauge-wrap">
          <div class="gauge" aria-label="Готовность факт ${fmtPct(p.readiness_fact)}, план ${fmtPctShort(p.readiness_plan)}">
            <svg viewBox="0 0 200 112" aria-hidden="true">
              <defs>
                <linearGradient id="gA" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#2C5F4A"/>
                  <stop offset="100%" stop-color="#B8864E"/>
                </linearGradient>
              </defs>
              <path d="M24 100 A76 76 0 0 1 176 100" fill="none" stroke="#E8E0D8" stroke-width="14" stroke-linecap="round"/>
              <path d="M24 100 A76 76 0 0 1 ${end.x.toFixed(1)} ${end.y.toFixed(1)}" fill="none" stroke="url(#gA)" stroke-width="14" stroke-linecap="round"/>
              <line x1="100" y1="24" x2="100" y2="36" stroke="#B8864E" stroke-width="2.5" transform="rotate(${planRot.toFixed(1)} 100 100)"/>
            </svg>
            <div class="center">
              <strong>${fmtPct(p.readiness_fact, 1)}</strong>
              <span>факт</span>
            </div>
          </div>
        </div>
        <div class="legend">
          <span><i style="background:linear-gradient(90deg,#2C5F4A,#B8864E)"></i>факт</span>
          <span><i style="background:#B8864E"></i>план</span>
        </div>`;

      document.getElementById("supply-block").innerHTML = `
        <h2 class="block-title">Комплектация</h2>
        <div class="bars">${DATA.supply.map(s => {
          const tone = s.tone === "ok" ? " ok" : s.tone === "alert" ? " alert" : "";
          const w = Math.min(100, Math.max(0, s.pct));
          return `<div class="bar-row">
            <div class="top"><span>${esc(s.name)}</span><strong>${fmtPctShort(s.pct)}</strong></div>
            <div class="track"><div class="fill${tone}" style="width:${w}%"></div></div>
          </div>`;
        }).join("")}</div>`;

      document.getElementById("finance-block").innerHTML = `
        <h2 class="block-title">Финансы</h2>
        <div class="dual">${DATA.finance.map(f => `
          <div class="dual-item">
            <div class="name">${esc(f.name)}</div>
            <div class="dual-bars">
              <div class="line"><span>план</span><div class="mini-track"><div class="mini-fill plan" style="width:100%"></div></div><b>${fmtNum(f.plan)}</b></div>
              <div class="line"><span>факт</span><div class="mini-track"><div class="mini-fill" style="width:${pctBar(f.fact, f.plan)}%"></div></div><b>${fmtNum(f.fact)}</b></div>
            </div>
          </div>`).join("")}</div>`;

      document.getElementById("labor-block").innerHTML = `
        <h2 class="block-title">Труд</h2>
        <div class="dual">${DATA.labor.map(l => {
          const ratio = pctBar(l.fact, l.plan);
          const ok = l.fact >= l.plan ? " ok" : "";
          return `<div class="dual-item">
            <div class="name">${esc(l.name)}</div>
            <div class="dual-bars">
              <div class="line"><span>план</span><div class="mini-track"><div class="mini-fill plan" style="width:100%"></div></div><b>${fmtNum(l.plan)}</b></div>
              <div class="line"><span>факт</span><div class="mini-track"><div class="mini-fill${ok}" style="width:${ratio}%"></div></div><b>${fmtNum(l.fact)}</b></div>
            </div>
          </div>`;
        }).join("")}</div>`;

      document.getElementById("risks-block").innerHTML = `
        <h2 class="block-title">Риски</h2>
        <div class="compact-list">${DATA.risks.map(r => `
          <div class="compact-row">
            <span class="dot"></span>
            <span class="t">${esc(r.t)}</span>
            <span class="m">${esc(r.m)}</span>
          </div>`).join("")}</div>`;
    }

    function renderDonut() {
      const tasks = DATA.tasks || [];
      const open = tasks.filter(x => x.status === "В работе").length;
      const fail = tasks.filter(x => x.status === "Не исполнено").length;
      const total = tasks.length || 1;
      const C = 2 * Math.PI * 14;
      const openLen = (open / total) * C;
      const failLen = (fail / total) * C;
      document.getElementById("status-block").innerHTML = `
        <h2 class="block-title">Статусы</h2>
        <div class="status-chart">
          <div class="ring" aria-label="${total} задач">
            <svg width="120" height="120" viewBox="0 0 36 36" aria-hidden="true">
              <defs>
                <linearGradient id="gOk" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#2C5F4A"/>
                  <stop offset="100%" stop-color="#6B8F7A"/>
                </linearGradient>
                <linearGradient id="gCrit" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#9E3B33"/>
                  <stop offset="100%" stop-color="#D4A574"/>
                </linearGradient>
              </defs>
              <circle cx="18" cy="18" r="14" fill="none" stroke="#E8E0D8" stroke-width="4"/>
              <circle cx="18" cy="18" r="14" fill="none" stroke="url(#gOk)" stroke-width="4"
                stroke-dasharray="${openLen.toFixed(2)} ${C.toFixed(2)}" stroke-dashoffset="0"/>
              <circle cx="18" cy="18" r="14" fill="none" stroke="url(#gCrit)" stroke-width="4"
                stroke-dasharray="${failLen.toFixed(2)} ${C.toFixed(2)}" stroke-dashoffset="${(-openLen).toFixed(2)}"/>
            </svg>
            <div class="mid"><strong>${total}</strong><span>задач</span></div>
          </div>
          <div class="stat-legend">
            <div><span><i class="swatch" style="background:#2C5F4A"></i>в работе</span><b>${open}</b></div>
            <div><span><i class="swatch" style="background:#9E3B33"></i>не исполнено</span><b>${fail}</b></div>
          </div>
        </div>`;
    }

    function renderTasks() {
      const list = document.getElementById("task-list");
      const rows = (DATA.tasks || []).filter(x => {
        if (filter === "all") return true;
        if (filter === "fail") return x.status === "Не исполнено";
        return x.status === "В работе";
      });
      if (!rows.length) {
        list.innerHTML = `<div class="compact-row"><span></span><span class="t" style="color:var(--muted)">Нет задач</span><span></span></div>`;
        return;
      }
      list.innerHTML = rows.map(x => `
        <div class="compact-row">
          <span class="dot" style="background:${x.status === "Не исполнено" ? "var(--critical)" : "var(--kpi)"}"></span>
          <span class="t">${esc(x.t)}</span>
          <span class="m">${esc(x.m)}</span>
        </div>`).join("");
    }

    function bindUI() {
      document.querySelectorAll(".nav button").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".nav button").forEach(b => {
            b.classList.remove("active");
            b.setAttribute("aria-selected", "false");
          });
          document.querySelectorAll(".panel").forEach(p => {
            p.classList.remove("active");
            p.hidden = true;
          });
          btn.classList.add("active");
          btn.setAttribute("aria-selected", "true");
          const panel = document.getElementById(btn.dataset.tab);
          panel.classList.add("active");
          panel.hidden = false;
        });
      });

      document.getElementById("filters").addEventListener("click", (e) => {
        const chip = e.target.closest("button");
        if (!chip) return;
        document.querySelectorAll("#filters button").forEach(c => c.classList.remove("active"));
        chip.classList.add("active");
        filter = chip.dataset.filter;
        renderTasks();
      });
    }

    function paint() {
      renderProject();
      renderDonut();
      renderTasks();
    }

    async function boot() {
      bindUI();
      try {
        const res = await fetch("data.json", { cache: "no-store" });
        if (!res.ok) throw new Error(String(res.status));
        DATA = await res.json();
      } catch (_) {
        DATA = FALLBACK;
      }
      paint();
    }

    boot();
  </script>
</body>
</html>
