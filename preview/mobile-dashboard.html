<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F7F5F0" />
  <title>ЖК «Северный» — мобильный дашборд</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:wght@500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #F7F5F0;
      --card: #FFFFFF;
      --ink: #3A3A3A;
      --muted: #8A8580;
      --line: #E8E0D8;
      --kpi: #2C5F4A;
      --attention: #B8864E;
      --critical: #9E3B33;
      --ok: #6B8F7A;
      --warm: #D4A574;
      --track: #E8E0D8;
      --shadow: 0 4px 16px rgba(58, 58, 58, 0.06);
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-t: env(safe-area-inset-top, 0px);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, sans-serif;
      color: var(--ink);
      background: #EDE9E2;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }
    .stage {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 24px 12px;
    }
    .device {
      width: min(390px, 100%);
      max-height: min(860px, calc(100dvh - 48px));
      background: var(--bg);
      border-radius: 36px;
      box-shadow:
        0 0 0 1px rgba(58,58,58,.06),
        0 0 0 10px #1a1a1a,
        0 28px 56px rgba(58,58,58,.12);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .device::before {
      content: "";
      display: block;
      width: 120px;
      height: 28px;
      margin: 10px auto 0;
      background: #1a1a1a;
      border-radius: 0 0 16px 16px;
      flex-shrink: 0;
    }
    .phone {
      padding: 8px 16px calc(28px + var(--safe-b));
      min-height: 0;
      flex: 1 1 auto;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
    @media (max-width: 440px) {
      body { background: var(--bg); }
      .stage { padding: 0; }
      .device {
        width: 100%;
        height: 100dvh;
        max-height: 100dvh;
        min-height: 100dvh;
        border-radius: 0;
        box-shadow: none;
      }
      .device::before { display: none; }
      .phone {
        padding-top: calc(12px + var(--safe-t));
      }
    }

    .nav {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 24px;
    }
    .nav button {
      min-height: 48px;
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 12px;
      box-shadow: var(--shadow);
      font: 500 13px Inter, sans-serif;
      color: var(--muted);
      cursor: pointer;
      transition: color .2s, border-color .2s, background .2s;
    }
    .nav button.active {
      color: var(--kpi);
      border-color: var(--kpi);
      background: #fff;
    }

    .panel { display: none; }
    .panel.active { display: block; animation: enter .35s ease both; }

    .object {
      font-family: Lora, Georgia, serif;
      font-weight: 600;
      font-size: 16px;
      color: var(--ink);
      margin: 0 0 6px;
      letter-spacing: -0.01em;
    }
    .meta {
      font-size: 11px;
      color: var(--muted);
      margin: 0 0 20px;
    }

    .scores {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 16px 14px;
    }
    .score.wide { grid-column: 1 / -1; }
    .score .lbl {
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 500;
    }
    .score .num {
      font-family: Inter, sans-serif;
      font-size: 32px;
      font-weight: 600;
      line-height: 1;
      color: var(--kpi);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }
    .score .num.sm { font-size: 28px; }
    .score .num.warn { color: var(--attention); }
    .score .delta {
      margin-top: 8px;
      font-size: 11px;
      color: var(--attention);
      font-weight: 500;
    }

    .block { margin-bottom: 20px; }
    .block-title {
      font-family: Lora, Georgia, serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      margin: 0 0 14px;
    }

    .gauge-wrap { display: grid; place-items: center; }
    .gauge { width: 200px; height: 112px; position: relative; }
    .gauge svg { width: 200px; height: 112px; display: block; }
    .gauge .center {
      position: absolute;
      left: 0; right: 0; bottom: 2px;
      text-align: center;
    }
    .gauge .center strong {
      display: block;
      font-size: 28px;
      font-weight: 600;
      color: var(--kpi);
      line-height: 1;
    }
    .gauge .center span {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .legend {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-top: 10px;
      font-size: 11px;
      color: var(--muted);
    }
    .legend i {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 2px;
      margin-right: 6px;
      vertical-align: middle;
    }

    /* SMR days */
    .smr-card.alert {
      border-color: rgba(184, 134, 78, 0.55);
      box-shadow: 0 4px 16px rgba(184, 134, 78, 0.1), var(--shadow);
    }
    .smr-kpis {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .smr-kpi {
      text-align: center;
      padding: 10px 6px;
      border-radius: 10px;
      background: rgba(247, 245, 240, 0.9);
      border: 1px solid var(--line);
    }
    .smr-kpi .v {
      display: block;
      font-size: 18px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--ink);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }
    .smr-kpi .v.warn { color: var(--attention); }
    .smr-kpi .v.crit { color: var(--critical); }
    .smr-kpi .l {
      display: block;
      margin-top: 4px;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .smr-compare { display: grid; gap: 14px; }
    .smr-note {
      margin: 14px 0 0;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(184, 134, 78, 0.1);
      border: 1px solid rgba(184, 134, 78, 0.28);
      font-size: 12px;
      line-height: 1.4;
      color: var(--ink);
    }
    .smr-note.crit {
      background: rgba(158, 59, 51, 0.07);
      border-color: rgba(158, 59, 51, 0.22);
    }
    .smr-note strong { color: var(--attention); font-weight: 600; }
    .smr-note.crit strong { color: var(--critical); }

    .bars { display: grid; gap: 16px; }
    .bar-row .top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 11px;
      color: var(--muted);
    }
    .bar-row .top strong {
      color: var(--ink);
      font-weight: 600;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }
    .track {
      height: 10px;
      background: var(--track);
      border-radius: 999px;
      overflow: hidden;
    }
    .fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #2C5F4A, #B8864E);
      transform-origin: left center;
      animation: grow .85s ease both;
    }
    .fill.alert {
      background: linear-gradient(90deg, #9E3B33, #D4A574);
    }
    .fill.ok {
      background: linear-gradient(90deg, #2C5F4A, #6B8F7A);
    }
    .fill.attention {
      background: linear-gradient(90deg, #B8864E, #D4A574);
    }

    .dual { display: grid; gap: 16px; }
    .dual-item .name {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .dual-bars { display: grid; gap: 8px; }
    .dual-bars .line {
      display: grid;
      grid-template-columns: 40px 1fr 52px;
      gap: 8px;
      align-items: center;
      font-size: 10px;
      color: var(--muted);
    }
    .dual-bars .line b {
      text-align: right;
      color: var(--ink);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .mini-track {
      height: 7px;
      background: var(--track);
      border-radius: 999px;
      overflow: hidden;
    }
    .mini-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #2C5F4A, #B8864E);
    }
    .mini-fill.plan {
      background: linear-gradient(90deg, #B8864E, #D4A574);
      opacity: 0.85;
    }
    .mini-fill.ok {
      background: linear-gradient(90deg, #2C5F4A, #6B8F7A);
    }

    .compact-list { display: grid; gap: 0; }
    .compact-row {
      display: grid;
      grid-template-columns: 8px 1fr auto;
      gap: 12px;
      align-items: center;
      min-height: 48px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
    }
    .compact-row:last-child { border-bottom: 0; }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--critical);
      flex-shrink: 0;
    }
    .compact-row .t {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 500;
      color: var(--ink);
    }
    .compact-row .m {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .filters {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
    }
    .filters.risks-filters {
      grid-template-columns: 1fr 1fr;
    }
    .filters button {
      min-height: 44px;
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 12px;
      box-shadow: var(--shadow);
      font: 500 12px Inter, sans-serif;
      color: var(--muted);
      cursor: pointer;
      transition: color .2s, border-color .2s;
    }
    .filters button.active {
      color: var(--kpi);
      border-color: var(--kpi);
      background: #fff;
    }

    .task-card { padding: 4px 14px 8px; }

    .group-head {
      margin: 16px 0 4px;
      padding: 8px 0 4px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--line);
    }
    .group-head:first-child { margin-top: 4px; }

    .compact-row.task-tap,
    .compact-row.risk-tap {
      width: 100%;
      border: 0;
      background: transparent;
      text-align: left;
      font: inherit;
      color: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      border-radius: 8px;
      margin: 0 -6px;
      padding-left: 6px;
      padding-right: 6px;
      transition: background .15s ease;
    }
    .compact-row.task-tap:hover,
    .compact-row.task-tap:focus-visible,
    .compact-row.risk-tap:hover,
    .compact-row.risk-tap:focus-visible {
      background: rgba(44, 95, 74, 0.06);
      outline: none;
    }
    .compact-row.task-tap:active,
    .compact-row.risk-tap:active {
      background: rgba(44, 95, 74, 0.1);
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 44px;
      padding: 0 4px;
      margin: 0 0 16px;
      border: 0;
      background: transparent;
      color: var(--kpi);
      font-family: Inter, system-ui, sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .back-btn:hover,
    .back-btn:focus-visible {
      color: var(--ink);
      outline: none;
    }
    .back-btn .chev {
      font-size: 18px;
      line-height: 1;
      margin-top: -1px;
    }

    .detail-card {
      padding: 20px 18px 22px;
    }
    .detail-title {
      margin: 0 0 14px;
      font-family: Lora, Georgia, serif;
      font-size: 18px;
      font-weight: 600;
      line-height: 1.35;
      color: var(--ink);
      letter-spacing: -0.01em;
    }
    .detail-desc {
      margin: 0 0 22px;
      font-size: 14px;
      line-height: 1.55;
      color: var(--ink);
      font-weight: 400;
    }
    .detail-meta {
      display: grid;
      gap: 14px;
      margin: 0;
      padding: 0;
      border-top: 1px solid var(--line);
      padding-top: 18px;
    }
    .detail-meta .row {
      display: grid;
      gap: 4px;
    }
    .detail-meta dt {
      margin: 0;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .detail-meta dd {
      margin: 0;
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
      line-height: 1.4;
    }
    .detail-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .detail-status .dot {
      width: 8px;
      height: 8px;
    }
    .detail-block {
      font-size: 12px;
      color: var(--muted);
      font-weight: 400;
    }
    .detail-explain {
      margin-top: 4px;
      font-size: 14px;
      line-height: 1.5;
      font-weight: 400;
      color: var(--ink);
    }
    .detail-explain.empty {
      color: var(--muted);
      font-style: normal;
    }

    .status-chart {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 20px;
      align-items: center;
      margin-bottom: 4px;
    }
    .ring {
      width: 120px;
      height: 120px;
      position: relative;
      flex-shrink: 0;
    }
    .ring svg {
      display: block;
      width: 120px;
      height: 120px;
      transform: rotate(-90deg);
    }
    .ring .seg {
      cursor: pointer;
      transition: stroke-width .15s ease, opacity .15s ease;
    }
    .ring .seg:hover { opacity: 0.9; }
    .ring .seg.active-seg { stroke-width: 5.2; }
    .ring .mid {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      text-align: center;
      z-index: 1;
      border: 0;
      background: transparent;
      cursor: pointer;
      padding: 0;
      font: inherit;
      color: inherit;
      border-radius: 50%;
      width: 64px;
      height: 64px;
      margin: auto;
      -webkit-tap-highlight-color: transparent;
    }
    .ring .mid:focus-visible {
      outline: 2px solid var(--kpi);
      outline-offset: 2px;
    }
    .ring .mid strong {
      display: block;
      font-size: 26px;
      font-weight: 600;
      color: var(--kpi);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }
    .ring .mid span {
      display: block;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      line-height: 1.2;
    }
    .stat-legend { display: grid; gap: 8px; }
    .stat-legend button {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      min-height: 40px;
      padding: 6px 8px;
      border: 1px solid transparent;
      border-radius: 10px;
      background: transparent;
      font: inherit;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      text-align: left;
      transition: background .15s, border-color .15s;
    }
    .stat-legend button:hover,
    .stat-legend button:focus-visible {
      background: rgba(44, 95, 74, 0.06);
      outline: none;
    }
    .stat-legend button.active {
      border-color: var(--line);
      background: rgba(44, 95, 74, 0.06);
      color: var(--ink);
    }
    .stat-legend b { color: var(--ink); font-variant-numeric: tabular-nums; }
    .swatch {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 2px;
      margin-right: 8px;
    }

    .hint-risks {
      margin: 0;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
    .linkish {
      display: block;
      width: 100%;
      margin-top: 12px;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--bg);
      color: var(--kpi);
      font: 500 13px Inter, sans-serif;
      cursor: pointer;
    }

    @keyframes enter {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: none; }
    }
    @keyframes grow {
      from { transform: scaleX(0.12); }
      to { transform: scaleX(1); }
    }
    @media (prefers-reduced-motion: reduce) {
      .panel.active, .fill { animation: none; }
    }

    .edit-link {
      display: block;
      text-align: center;
      margin: 28px 0 8px;
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--muted);
      text-decoration: none;
      opacity: 0.65;
    }
    .edit-link:hover,
    .edit-link:focus {
      opacity: 1;
      color: var(--kpi);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="device">
      <div class="phone">
        <nav class="nav" role="tablist" aria-label="Разделы">
          <button class="active" data-tab="project" type="button" role="tab" aria-selected="true">Проект</button>
          <button data-tab="tasks" type="button" role="tab" aria-selected="false">Задачи</button>
          <button data-tab="risks" type="button" role="tab" aria-selected="false">Риски</button>
        </nav>

        <section id="project" class="panel active" role="tabpanel">
          <h1 class="object" id="proj-name">—</h1>
          <p class="meta" id="proj-meta">—</p>
          <div class="scores" id="scores"></div>
          <div class="card block" id="smr-block"></div>
          <div class="card block" id="gauge-block"></div>
          <div class="card block" id="supply-block"></div>
          <div class="card block" id="finance-block"></div>
          <div class="card block" id="labor-block"></div>
          <div class="card block" id="risks-preview" style="margin-bottom:0"></div>
        </section>

        <section id="tasks" class="panel" hidden role="tabpanel">
          <div class="card block" id="status-block"></div>
          <div class="filters" id="filters" role="group" aria-label="Фильтр задач">
            <button class="active" data-filter="open" type="button">В работе</button>
            <button data-filter="fail" type="button">Крит.</button>
            <button data-filter="all" type="button">Все</button>
          </div>
          <div class="card task-card">
            <div class="compact-list" id="task-list"></div>
          </div>
        </section>

        <section id="task-detail" class="panel" hidden role="tabpanel" aria-label="Карточка задачи">
          <button type="button" class="back-btn" id="task-back" aria-label="Назад к списку задач">
            <span class="chev" aria-hidden="true">‹</span> Назад
          </button>
          <div class="card detail-card" id="task-detail-body"></div>
        </section>

        <section id="risks" class="panel" hidden role="tabpanel">
          <div class="filters risks-filters" id="risk-filters" role="group" aria-label="Фильтр рисков">
            <button class="active" data-risk-filter="open" type="button">В работе</button>
            <button data-risk-filter="done" type="button">Выполнено</button>
            <button data-risk-filter="critical" type="button">Критические</button>
            <button data-risk-filter="all" type="button">Все</button>
          </div>
          <div class="card task-card">
            <div class="compact-list" id="risk-list"></div>
          </div>
        </section>

        <section id="risk-detail" class="panel" hidden role="tabpanel" aria-label="Карточка риска">
          <button type="button" class="back-btn" id="risk-back" aria-label="Назад к списку рисков">
            <span class="chev" aria-hidden="true">‹</span> Назад
          </button>
          <div class="card detail-card" id="risk-detail-body"></div>
        </section>

        <a class="edit-link" href="../edit.html" id="edit-link">Редактор</a>
      </div>
    </div>
  </div>

  <script>
    /* Fallback if fetch('data.json') fails (file:// or offline). Update via data.json + push. */
    const FALLBACK = {
      project: {
        name: "ЖК «Северный»",
        meta: "Генподряд · ООО «Успех» · срок до 30.06.2027",
        readiness_fact: 54.71,
        readiness_plan: 55,
        delta_pp: -0.29,
        contract_mln: 3544,
        paid_mln: 4368,
        workers_fact: 300,
        workers_plan: 500,
        supply_total_pct: 33,
        start_date: "2019-06-05",
        directive_end: "2027-06-30"
      },
      smrDays: {
        elapsed: 2605,
        total: 2947,

              <defs>
                <linearGradient id="gOk" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#2C5F4A"/>
                  <stop offset="100%" stop-color="#6B8F7A"/>
                </linearGradient>
                <linearGradient id="gCrit" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#9E3B33"/>
                  <stop offset="100%" stop-color="#D4A574"/>
                </linearGradient>
              </defs>
              <circle cx="18" cy="18" r="14" fill="none" stroke="#E8E0D8" stroke-width="4"/>
              <circle class="seg${openActive}" data-filter="open" cx="18" cy="18" r="14" fill="none" stroke="url(#gOk)" stroke-width="4"
                stroke-dasharray="${openLen.toFixed(2)} ${C.toFixed(2)}" stroke-dashoffset="0"
                role="button" tabindex="0" aria-label="Фильтр: в работе"/>
              <circle class="seg${failActive}" data-filter="fail" cx="18" cy="18" r="14" fill="none" stroke="url(#gCrit)" stroke-width="4"
                stroke-dasharray="${failLen.toFixed(2)} ${C.toFixed(2)}" stroke-dashoffset="${(-openLen).toFixed(2)}"
                role="button" tabindex="0" aria-label="Фильтр: не исполнено"/>
            </svg>
            <button type="button" class="mid" data-filter="all" aria-label="Сбросить фильтр, показать все">
              <strong>${total}</strong><span>${filter === "all" ? "все" : "задач"}</span>
            </button>
          </div>
          <div class="stat-legend">
            <button type="button" data-filter="open" class="${filter === "open" ? "active" : ""}">
              <span><i class="swatch" style="background:#2C5F4A"></i>в работе</span><b>${open}</b>
            </button>
            <button type="button" data-filter="fail" class="${filter === "fail" ? "active" : ""}">
              <span><i class="swatch" style="background:#9E3B33"></i>не исполнено</span><b>${fail}</b>
            </button>
            <button type="button" data-filter="all" class="${filter === "all" ? "active" : ""}">
              <span><i class="swatch" style="background:#8A8580"></i>все</span><b>${tasks.length}</b>
            </button>
          </div>
        </div>`;
    }

    function renderTasks() {
      const list = document.getElementById("task-list");
      const rows = (DATA.tasks || [])
        .map((x, i) => ({ ...x, _i: i }))
        .filter(x => {
          if (filter === "all") return true;
          if (filter === "fail") return x.status === "Не исполнено";
          return x.status === "В работе";
        });
      if (!rows.length) {
        list.innerHTML = `<div class="compact-row"><span></span><span class="t" style="color:var(--muted)">Нет задач</span><span></span></div>`;
        return;
      }
      const order = [];
      const groups = new Map();
      rows.forEach(x => {
        const block = (x.block || "Прочее").trim();
        if (!groups.has(block)) {
          groups.set(block, []);
          order.push(block);
        }
        groups.get(block).push(x);
      });
      list.innerHTML = order.map(block => {
        const items = groups.get(block).map(x => `
          <button type="button" class="compact-row task-tap" data-task-index="${x._i}" aria-label="Открыть задачу: ${esc(x.t)}">
            <span class="dot" style="background:${x.status === "Не исполнено" ? "var(--critical)" : "var(--kpi)"}"></span>
            <span class="t">${esc(x.t)}</span>
            <span class="m">${esc(x.m)}</span>
          </button>`).join("");
        return `<div class="group-head">${esc(block)}</div>${items}`;
      }).join("");
    }

    function renderRisks() {
      const list = document.getElementById("risk-list");
      const rows = (DATA.risks || [])
        .map((x, i) => ({ ...x, _i: i }))
        .filter(x => {
          if (riskFilter === "all") return true;
          if (riskFilter === "done") return x.status === "Выполнено";
          if (riskFilter === "critical") return x.risk_level === "Критический";
          return x.status === "В работе";
        });
      if (!rows.length) {
        list.innerHTML = `<div class="compact-row"><span></span><span class="t" style="color:var(--muted)">Нет рисков</span><span></span></div>`;
        return;
      }
      list.innerHTML = rows.map(x => `
        <button type="button" class="compact-row risk-tap" data-risk-index="${x._i}" aria-label="Открыть риск: ${esc(x.t)}">
          <span class="dot" style="background:${riskDot(x)}"></span>
          <span class="t">${esc(x.t)}</span>
          <span class="m">${esc(x.m || shortDate(x.deadline))}</span>
        </button>`).join("");
    }

    function bindUI() {
      document.querySelectorAll(".nav button").forEach(btn => {
        btn.addEventListener("click", () => {
          detailOpen = false;
          riskDetailOpen = false;
          setNav(btn.dataset.tab);
          showPanel(btn.dataset.tab);
        });
      });

      document.getElementById("filters").addEventListener("click", (e) => {
        const chip = e.target.closest("button");
        if (!chip) return;
        setTaskFilter(chip.dataset.filter);
      });

      document.getElementById("status-block").addEventListener("click", (e) => {
        const hit = e.target.closest("[data-filter]");
        if (!hit) return;
        setTaskFilter(hit.dataset.filter);
      });

      document.getElementById("status-block").addEventListener("keydown", (e) => {
        if (e.key !== "Enter" && e.key !== " ") return;
        const hit = e.target.closest("[data-filter]");
        if (!hit) return;
        e.preventDefault();
        setTaskFilter(hit.dataset.filter);
      });

      document.getElementById("task-list").addEventListener("click", (e) => {
        const btn = e.target.closest("[data-task-index]");
        if (!btn) return;
        openTaskDetail(Number(btn.dataset.taskIndex));
      });

      document.getElementById("task-back").addEventListener("click", () => {
        closeTaskDetail();
      });

      document.getElementById("risk-filters").addEventListener("click", (e) => {
        const chip = e.target.closest("button");
        if (!chip) return;
        setRiskFilter(chip.dataset.riskFilter);
      });

      document.getElementById("risk-list").addEventListener("click", (e) => {
        const btn = e.target.closest("[data-risk-index]");
        if (!btn) return;
        openRiskDetail(Number(btn.dataset.riskIndex));
      });

      document.getElementById("risk-back").addEventListener("click", () => {
        closeRiskDetail();
      });

      document.getElementById("risks-preview").addEventListener("click", (e) => {
        if (!e.target.closest("#goto-risks")) return;
        detailOpen = false;
        riskDetailOpen = false;
        setNav("risks");
        showPanel("risks");
      });
    }

    function paint() {
      renderProject();
      renderDonut();
      renderTasks();
      renderRisks();
    }

    async function boot() {
      bindUI();
      try {
        const res = await fetch("data.json", { cache: "no-store" });
        if (!res.ok) throw new Error(String(res.status));
        DATA = await res.json();
      } catch (_) {
        DATA = FALLBACK;
      }
      paint();
    }

    boot();
  </script>
</body>
</html>
